name: MedStart CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Web Dependencies
        run: |
          cd apps/web
          npm install

      - name: Verify Web TypeScript Strict Build
        run: |
          cd apps/web
          npm run build

      - name: Install Server Dependencies
        run: |
          cd apps/server
          npm install

      - name: Verify NestJS Server Build
        run: |
          cd apps/server
          npm run build
